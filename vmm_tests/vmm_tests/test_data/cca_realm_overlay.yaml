%YAML 1.2
---
description: >-
  Buildroot overlay that installs realm auto-launch and injects
  Plane0 start-tmk.sh via lkvm 9P root.

build:
  buildroot:
    prebuild:
      - mkdir -p ${param:builddir}/overlay/usr/local/bin
      - mkdir -p ${param:builddir}/overlay/etc/init.d

      # =========================
      # run_realm_test.sh
      # =========================
      - |
        cat > ${param:builddir}/overlay/usr/local/bin/run_realm_test.sh <<'SH'
        #!/usr/bin/env bash
        set -euo pipefail

        echo "[realm-launch] Starting..."
        date

        CCA_DIR="$${CCA_DIR:-/cca}"
        LKVM="$${CCA_DIR}/lkvm"
        KERNEL="$${KERNEL:-/cca/Image}"
        GUESTROOT="/.lkvm/default"

        # Wait for artifacts
        for i in $$(seq 1 30); do
            echo "[realm-launch] waiting for artifacts: $$i"
            if [ -x "$$LKVM" ] && [ -f "$$KERNEL" ]; then
                break
            fi
            sleep 1
        done

        if [ ! -x "$$LKVM" ]; then
            echo "[realm-launch][ERROR] Missing $$LKVM"
            exit 1
        fi

        if [ ! -f "$$KERNEL" ]; then
            echo "[realm-launch][ERROR] Missing $$KERNEL"
            exit 1
        fi

        # =========================
        # Background watcher
        # =========================
        prepare_plane0_hook() {
            echo "[realm-launch] watcher waiting for Plane0 root tree..."

            for i in $$(seq 1 300); do
                if [ -d "$$GUESTROOT/root" ] && [ -e "$$GUESTROOT/virt/init" ]; then
                    echo "[realm-launch] Plane0 root tree found"
                    break
                fi
                echo "[realm-launch] waiting for Plane0 root tree: $$i/300"
                sleep 1
            done

            if [ ! -d "$$GUESTROOT/root" ]; then
                echo "[realm-launch][ERROR] Plane0 root tree did not appear"
                return 1
            fi


            echo "[realm-launch] installing busybox..."

            cp /bin/busybox "$$GUESTROOT/root/busybox"
            chmod 755 "$$GUESTROOT/root/busybox"

            echo "[realm-launch] installing start-tmk.sh..."

            cat > "$$GUESTROOT/root/start-tmk.sh" <<'EOF'
        #!/root/busybox sh
        set -e

        echo "[plane0] start-tmk.sh reached"

        mkdir -p /root/mount
        mount -t 9p -o trans=virtio cca_mount /root/mount

        cd /root/mount
        export RUST_BACKTRACE=1

        echo "[plane0] Launching tmk_vmm..."
        exec ./tmk_vmm --hv cca --tmk ./simple_tmk
        EOF

            chmod 755 "$$GUESTROOT/root/start-tmk.sh"

            # Debug to verify correct shebang + interpreter
            od -An -tx1 -N16 "$$GUESTROOT/root/start-tmk.sh" >/dev/console 2>&1 || true
            head -1 "$$GUESTROOT/root/start-tmk.sh" >/dev/console 2>&1 || true

            ls -l "$$GUESTROOT/root/busybox" >/dev/console 2>&1 || true
            head -1 "$$GUESTROOT/root/start-tmk.sh" >/dev/console 2>&1 || true

            echo "[realm-launch] Installed $$GUESTROOT/root/start-tmk.sh"
        }

        # Start watcher in background
        prepare_plane0_hook &

        cd "$$CCA_DIR"

        echo "[realm-launch] Launching lkvm..."

        exec ./lkvm run --realm --disable-sve --irqchip=gicv3-its \
            -c 1 -m 512 \
            --no-pvtime --force-pci \
            --console virtio \
            --kernel "$$KERNEL" \
            --9p /cca/,cca_mount \
            -p "console=hvc0 root=/dev/vda2" \
            --measurement-algo=sha256 \
            --restricted_mem
        SH

      # =========================
      # S99realm-launch
      # =========================
      - |
        cat > ${param:builddir}/overlay/etc/init.d/S99realm-launch <<'SH'
        #!/bin/sh

        case "$$1" in
            start|"")
                echo "[realm-launch] starting on /dev/console" >/dev/console
                if [ -x /usr/local/bin/run_realm_test.sh ]; then
                    exec </dev/console >/dev/console 2>&1 /usr/local/bin/run_realm_test.sh
                fi
                ;;
            stop)
                ;;
            restart)
                ;;
            *)
                echo "Usage: $$0 {start|stop|restart}"
                exit 1
                ;;
        esac

        exit 0
        SH

      # Permissions
      - chmod 0755 ${param:builddir}/overlay/usr/local/bin/run_realm_test.sh
      - chmod 0755 ${param:builddir}/overlay/etc/init.d/S99realm-launch

      # Enable overlay
      - ${param:sourcedir}/utils/config --file ${param:builddir}/.config --set-val BR2_ROOTFS_OVERLAY "${param:builddir}/overlay"
